<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Cobros ST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --azul-dark: #001f3f;
            --rojo-distelsa: #e30613;
            --gris-fondo: #f8f9fa;
            --sidebar-width: 260px;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--gris-fondo); overflow-x: hidden; }

        /* VISTA LOGIN */
        #login-view {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, var(--azul-dark) 0%, #004080 100%);
        }
        .login-card {
            background: white; padding: 40px; border-radius: 15px; width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center;
        }

        /* VISTA PRINCIPAL (ESCRITORIO) */
        #main-app { display: none; height: 100vh; }
        
        .sidebar {
            width: var(--sidebar-width); background: var(--azul-dark); color: white;
            height: 100vh; position: fixed; left: 0; top: 0; padding-top: 20px;
        }

        .main-content {
            margin-left: var(--sidebar-width); padding: 30px; width: calc(100% - var(--sidebar-width));
        }

        .header {
            background: white; padding: 15px 30px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;
        }

        /* TABLAS Y FORMULARIOS */
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f1f1f1; color: #333; }

        .btn-primary { background: var(--rojo-distelsa); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background: #b30510; }
        .input-group { margin-bottom: 15px; text-align: left; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="login-view">
        <div class="login-card">
            <img src="https://www.distelsa.com.gt/media/logo/stores/1/logo_distelsa.png" width="180" style="margin-bottom: 20px;">
            <h2 style="color: var(--azul-dark)">Portal Administrativo</h2>
            <div class="input-group">
                <input type="text" id="user" placeholder="Usuario">
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="Contraseña">
            </div>
            <button class="btn-primary" id="btn-login" onclick="login()" style="width: 100%; font-weight: bold;">ACCEDER AL SISTEMA</button>
            <p id="login-msg" style="color: red; margin-top: 15px; font-size: 14px;"></p>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <div style="text-align: center; margin-bottom: 30px;">
                <h3 style="color: white; letter-spacing: 1px;">COBROS ST</h3>
            </div>
            <div style="padding: 10px 20px;">
                <p><i class="fas fa-chart-line"></i> Dashboard</p>
                <p><i class="fas fa-users"></i> Usuarios</p>
                <p><i class="fas fa-file-invoice-dollar"></i> Nueva Gestión</p>
                <p><i class="fas fa-history"></i> Histórico</p>
                <hr style="border: 0.5px solid #2d4a6b;">
                <p onclick="location.reload()" style="cursor: pointer; color: #ff9b9b;"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</p>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <div id="userInfo">
                    <span style="color: #666;">Bienvenido,</span> <strong id="displayUser">---</strong>
                </div>
                <div id="campanaInfo">
                    <span class="badge" id="displayCampana" style="background: #e9ecef; padding: 5px 10px; border-radius: 4px;">---</span>
                </div>
            </div>

            <div class="card">
                <h3>Resumen de Usuarios en Sistema</h3>
                <div id="tabla-contenedor">
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Usuario</th>
                                <th>Rol</th>
                                <th>Campaña</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="lista-usuarios">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // TUS CREDENCIALES DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDehDeskqPXyZ5Clat2otLHKdB_nrIAWzk",
            authDomain: "gestiondecobrosst.firebaseapp.com",
            projectId: "gestiondecobrosst",
            storageBucket: "gestiondecobrosst.firebasestorage.app",
            messagingSenderId: "754092362751",
            appId: "1:754092362751:web:e658400641ffc6d8dab5ca",
            measurementId: "G-QS8CNF5NK6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FUNCIÓN LOGIN ---
        window.login = async function() {
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('login-msg');
            const btn = document.getElementById('btn-login');

            if(!u || !p) return;

            btn.disabled = true;
            btn.innerText = "VERIFICANDO...";

            try {
                const userRef = doc(db, "usuarios", u);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists() && userSnap.data().password === p) {
                    const data = userSnap.data();
                    document.getElementById('login-view').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                    document.getElementById('displayUser').innerText = data.nombre;
                    document.getElementById('displayCampana').innerText = data.campana;
                    
                    cargarUsuarios(); // Carga la tabla automáticamente al entrar
                } else {
                    msg.innerText = "Usuario o contraseña incorrectos";
                    btn.disabled = false;
                    btn.innerText = "ACCEDER AL SISTEMA";
                }
            } catch (error) {
                console.error(error);
                msg.innerText = "Error de conexión con la base de datos";
                btn.disabled = false;
            }
        };

        // --- CARGAR TABLA DESDE FIREBASE ---
        async function cargarUsuarios() {
            const tbody = document.getElementById('lista-usuarios');
            tbody.innerHTML = "Cargando datos...";

            try {
                const querySnapshot = await getDocs(collection(db, "usuarios"));
                tbody.innerHTML = "";
                
                querySnapshot.forEach((doc) => {
                    const d = doc.data();
                    const row = `<tr>
                        <td>${d.nombre}</td>
                        <td>${d.usuario || doc.id}</td>
                        <td>${d.rol}</td>
                        <td>${d.campana}</td>
                        <td><span style="color: green">● En línea</span></td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (e) {
                console.error("Error al cargar tabla:", e);
            }
        }
    </script>
</body>
</html>
