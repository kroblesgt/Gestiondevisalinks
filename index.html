<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Call Center ST | Grupo Distelsa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --rojo-distelsa: #e30613; --azul-distelsa: #003366; --fondo: #f4f6f9; --sidebar-w: 250px; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--fondo); color: #333; }
        /* Clases base */
        .hidden { display: none !important; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn-action { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .bg-blue { background: var(--azul-distelsa); } .bg-red { background: var(--rojo-distelsa); }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: var(--azul-distelsa); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        /* Layout */
        #login-view { position: fixed; inset: 0; background: linear-gradient(135deg, var(--azul-distelsa) 0%, #001f3f 100%); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 340px; text-align: center; }
        header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: white; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; }
        .sidebar { position: fixed; top: 60px; left: 0; bottom: 0; width: var(--sidebar-w); background: var(--azul-distelsa); color: white; padding-top: 20px; }
        .nav-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); border-left: 4px solid var(--rojo-distelsa); }
        .main-content { margin-left: var(--sidebar-w); margin-top: 60px; padding: 25px; }
    </style>
</head>
<body>

    <div id="login-view">
        <div class="login-card">
            <h2 style="color: var(--azul-distelsa);">Gestión de Cobros ST</h2>
            <form id="loginForm">
                <input type="text" id="user" placeholder="Usuario" required style="margin-bottom: 15px;">
                <input type="password" id="pass" placeholder="Contraseña" required style="margin-bottom: 20px;">
                <button type="submit" id="btnLogin" class="btn-action bg-red" style="width: 100%;">INICIAR SESIÓN</button>
            </form>
        </div>
    </div>

    <div id="app-view" class="hidden">
        <header>
            <h2 style="color: var(--azul-distelsa); margin:0;"><i class="fas fa-headset"></i> Distelsa ST</h2>
            <div style="text-align: right;">
                <strong id="displayUser">Usuario</strong>
                <button onclick="logout()" class="btn-action bg-red" style="margin-left: 15px; padding: 5px 10px;"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <div class="sidebar" id="menu-lateral">
            </div>

        <div class="main-content">
            
            <section id="sec-dashboard" class="card hidden">
                <h2><i class="fas fa-chart-pie"></i> Panel de Control</h2>
                <div class="grid-2">
                    <div><canvas id="chartEstatus"></canvas></div>
                    <div style="background: #fafafa; padding: 15px; border-radius: 8px;">
                        <h3>Usuarios en Línea</h3>
                        <ul id="lista-online" style="list-style: none; padding: 0;"></ul>
                    </div>
                </div>
            </section>

            <section id="sec-admin" class="card hidden">
                <h2><i class="fas fa-users-cog"></i> Administración de Usuarios</h2>
                <p>Módulo de gestión de usuarios activo.</p>
            </section>

            <section id="sec-gestion" class="card hidden">
                <h2><i class="fas fa-file-invoice-dollar"></i> Nueva Gestión de Cobro</h2>
                <div class="grid-3" style="margin-bottom: 15px;">
                    <input type="text" id="gc-nitCli" placeholder="NIT Cliente *">
                    <input type="text" id="gc-nomCli" placeholder="Nombre Cliente *">
                    <input type="text" id="gc-telCli" placeholder="Teléfono *">
                </div>
                
                <div style="background: #f4f6f9; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <h4>Agregar Servicio</h4>
                    <div class="grid-3">
                        <input type="text" id="gc-producto" placeholder="Producto/Servicio">
                        <input type="number" id="gc-precio" placeholder="Precio (Q)">
                        <button onclick="agregarServicio()" class="btn-action bg-blue">Agregar a la lista</button>
                    </div>
                    <table id="tabla-servicios" class="hidden">
                        <thead><tr><th>Producto</th><th>Precio</th></tr></thead>
                        <tbody id="lista-servicios"></tbody>
                    </table>
                </div>

                <button id="btnGuardarGestion" onclick="enviarGestion()" class="btn-action bg-red" style="width: 100%;"><i class="fas fa-save"></i> Guardar Ticket</button>
            </section>

            <section id="sec-seguimiento" class="card hidden">
                <h2><i class="fas fa-history"></i> Historial de Tickets</h2>
                <button onclick="cargarSeguimientos()" class="btn-action bg-blue" style="margin-bottom: 15px;"><i class="fas fa-sync"></i> Actualizar Tabla</button>
                <table>
                    <thead><tr><th>Ticket ID</th><th>Fecha</th><th>Cliente</th><th>Total</th><th>Estatus</th></tr></thead>
                    <tbody id="tabla-seguimientos-body"></tbody>
                </table>
            </section>

        </div>
    </div>

    <script>
        // REEMPLAZA ESTA URL POR LA DE TU NUEVA IMPLEMENTACIÓN DE APPS SCRIPT
        const API_URL = 'https://script.google.com/macros/s/AKfycbzPU5sKCn5uTlATown4d_imF-bON6T8TiCa2kGM4Sr-chZk2llCCQXrwk-oyu2rojgvWg/exec'; 
        let usuarioActual = "";
        let servicios = [];

        // 1. SISTEMA DE LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            btn.innerText = "Conectando..."; btn.disabled = true;

            const payload = {
                action: 'login',
                usuario: document.getElementById('user').value,
                password: document.getElementById('pass').value
            };

            try {
                const req = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const res = await req.json();

                if (res.success) {
                    usuarioActual = res.usuario;
                    document.getElementById('displayUser').innerText = res.nombre;
                    document.getElementById('login-view').classList.add('hidden');
                    document.getElementById('app-view').classList.remove('hidden');
                    construirMenu(res.permisos);
                } else {
                    alert(res.message);
                }
            } catch (err) {
                alert("Error de red.");
            } finally {
                btn.innerText = "INICIAR SESIÓN"; btn.disabled = false;
            }
        });

        // 2. CONSTRUIR MENÚ DINÁMICO
        function construirMenu(permisos) {
            const menu = document.getElementById('menu-lateral');
            menu.innerHTML = "";
            let primeraSeccion = "";

            if (permisos.dashboard === "SI") {
                menu.innerHTML += `<div class="nav-item" onclick="verSeccion('sec-dashboard')"><i class="fas fa-chart-pie"></i> Dashboard</div>`;
                primeraSeccion = primeraSeccion || 'sec-dashboard';
            }
            if (permisos.usuarios === "SI") {
                menu.innerHTML += `<div class="nav-item" onclick="verSeccion('sec-admin')"><i class="fas fa-users-cog"></i> Usuarios</div>`;
                primeraSeccion = primeraSeccion || 'sec-admin';
            }
            if (permisos.gestion === "SI") {
                menu.innerHTML += `<div class="nav-item" onclick="verSeccion('sec-gestion')"><i class="fas fa-file-invoice-dollar"></i> Gestión</div>`;
                primeraSeccion = primeraSeccion || 'sec-gestion';
            }
            if (permisos.seguimiento === "SI") {
                menu.innerHTML += `<div class="nav-item" onclick="verSeccion('sec-seguimiento')"><i class="fas fa-history"></i> Seguimiento</div>`;
                primeraSeccion = primeraSeccion || 'sec-seguimiento';
            }

            if (primeraSeccion) verSeccion(primeraSeccion);
        }

        // 3. CONTROL DE VISTAS
        function verSeccion(id) {
            document.querySelectorAll('.main-content > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'sec-seguimiento') cargarSeguimientos();
            if(id === 'sec-dashboard') cargarDashboard();
        }

        // 4. GESTIÓN DE COBRO (Lógica)
        function agregarServicio() {
            const prod = document.getElementById('gc-producto').value;
            const precio = document.getElementById('gc-precio').value;
            if(!prod || !precio) return alert("Llena producto y precio.");
            
            servicios.push({ producto: prod, precio: precio });
            document.getElementById('tabla-servicios').classList.remove('hidden');
            document.getElementById('lista-servicios').innerHTML += `<tr><td>${prod}</td><td>Q${precio}</td></tr>`;
            
            document.getElementById('gc-producto').value = "";
            document.getElementById('gc-precio').value = "";
        }

        async function enviarGestion() {
            if(servicios.length === 0) return alert("Agrega al menos un servicio.");
            
            const btn = document.getElementById('btnGuardarGestion');
            btn.innerText = "Guardando..."; btn.disabled = true;

            const payload = {
                action: 'guardarGestion',
                agente: usuarioActual,
                nit: document.getElementById('gc-nitCli').value,
                nombre: document.getElementById('gc-nomCli').value,
                telefono: document.getElementById('gc-telCli').value,
                servicios: servicios
            };

            fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(res => res.json())
                .then(data => {
                    alert("Ticket guardado: " + data.ticketId);
                    // Limpiar formulario aquí
                    servicios = [];
                    document.getElementById('lista-servicios').innerHTML = "";
                })
                .catch(() => alert("Error al guardar."))
                .finally(() => { btn.innerText = "Guardar Ticket"; btn.disabled = false; });
        }

        // 5. CERRAR SESIÓN
        function logout() {
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'logout', usuario: usuarioActual }) });
            location.reload();
        }

        // Funciones dummy para cargar datos (se conectarán al backend después)
        function cargarSeguimientos() { /* Lógica fetch para traer Gestiones */ }
        function cargarDashboard() { /* Lógica fetch para traer datos y renderizar Chart.js */ }
    </script>
</body>
</html>
